<!DOCTYPE html>
<html>
<head>
    <title>Care Plan Demo</title>
</head>
<body>
    <h1>Care Plan Generator</h1>

    <form id="careplanForm">
        <div>
            <label>Patient Name</label><br>
            <input id="patient_name" value="John Smith">
        </div>

        <div>
            <label>Medication</label><br>
            <input id="medication" value="Metformin">
        </div>

        <div>
            <label>Diagnosis or Condition</label><br>
            <textarea id="condition">Type 2 diabetes</textarea>
        </div>

        <div>
            <label>Patient Record</label><br>
            <textarea id="patient_record" rows="8" placeholder="Clinical notes, labs, medication history, allergies, and other patient-specific information"></textarea>
        </div>

        <button type="submit">Generate Care Plan</button>
    </form>

    <h2>Generated Care Plan</h2>
    <pre id="result"></pre>

    <script>
        document.getElementById("careplanForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            document.getElementById("result").textContent = "Generating...";

            const response = await fetch("/api/careplans/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    patient_name: document.getElementById("patient_name").value,
                    medication: document.getElementById("medication").value,
                    condition: document.getElementById("condition").value,
                    patient_record: document.getElementById("patient_record").value
                })
            });

            const data = await response.json();
            if (!response.ok) {
                document.getElementById("result").textContent = data.error || "Request failed";
                return;
            }
            const references = data.references.length
                ? "\n\nRetrieved references:\n" + data.references.map(
                    reference => `- ${reference.section_title} (${reference.score.toFixed(3)}) ${reference.source_url}`
                  ).join("\n")
                : "\n\nNo sufficiently relevant DailyMed reference was retrieved.";
            const carePlan = typeof data.care_plan === "string"
                ? data.care_plan
                : JSON.stringify(data.care_plan, null, 2);
            document.getElementById("result").textContent = carePlan + references;
        });
    </script>
</body>
</html>
